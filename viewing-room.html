<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewing Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Archivo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'EB Garamond', Georgia, serif;
    --font-body: 'Archivo', Helvetica, sans-serif;
    --color-bg: #faf9f7;
    --color-text: #1a1a1a;
    --color-text-light: #6b6b6b;
    --color-border: #e0ddd8;
    --max-width: 1200px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: var(--color-bg);
    color: var(--color-text); -webkit-font-smoothing: antialiased; line-height: 1.5;
  }

  .vr-loading, .vr-error {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; padding: 2rem; text-align: center;
  }
  .vr-loading p, .vr-error p {
    font-size: 0.85rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--color-text-light);
  }
  .vr-error p { color: #8b4049; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--color-border);
    border-top-color: var(--color-text); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .vr-header {
    max-width: var(--max-width); margin: 0 auto;
    padding: 4rem 2rem 2rem; border-bottom: 1px solid var(--color-border);
  }
  .vr-header h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.8rem); line-height: 1.15;
  }
  .vr-header .vr-subtitle {
    font-size: 0.8rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--color-text-light); margin-top: 0.75rem;
  }

  .vr-gallery { max-width: var(--max-width); margin: 0 auto; padding: 3rem 2rem 6rem; }

  .vr-artwork {
    display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;
    align-items: start; padding: 3rem 0; border-bottom: 1px solid var(--color-border);
    opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease forwards;
  }
  .vr-artwork:last-child { border-bottom: none; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .vr-artwork-image { position: relative; overflow: hidden; background: #eee; cursor: pointer; }
  .vr-artwork-image img { width: 100%; height: auto; display: block; transition: transform 0.5s ease; }
  .vr-artwork-image:hover img { transform: scale(1.02); }

  .vr-artwork-info { padding-top: 0.25rem; }
  .vr-artwork-artist {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--color-text-light); margin-bottom: 0.5rem;
  }
  .vr-artwork-title {
    font-family: var(--font-display); font-size: 1.4rem;
    font-weight: 400; font-style: italic; line-height: 1.3; margin-bottom: 0.25rem;
  }
  .vr-artwork-year { font-size: 0.85rem; color: var(--color-text-light); margin-bottom: 1.25rem; }
  .vr-artwork-details { font-size: 0.82rem; line-height: 1.7; white-space: pre-line; }
  .vr-artwork-price {
    font-size: 0.85rem; font-weight: 500; margin-top: 1.25rem;
    padding-top: 1rem; border-top: 1px solid var(--color-border);
  }
  .vr-artwork-status {
    display: inline-block; font-size: 0.7rem; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0.2rem 0.6rem; margin-top: 0.75rem;
    border: 1px solid var(--color-border); color: var(--color-text-light);
  }
  .vr-artwork-status.sold { border-color: #c4a882; color: #a08060; background: #fdf8f2; }
  .vr-artwork-inquire {
    display: inline-block; font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; margin-top: 1.25rem; padding: 0.5rem 1.5rem;
    background: var(--color-text); color: var(--color-bg);
    text-decoration: none; transition: opacity 0.2s;
  }
  .vr-artwork-inquire:hover { opacity: 0.8; }

  .vr-footer {
    max-width: var(--max-width); margin: 0 auto; padding: 2rem;
    text-align: center; font-size: 0.75rem; letter-spacing: 0.06em; color: var(--color-text-light);
  }
  .vr-footer a { color: var(--color-text); text-decoration: none; }

  .vr-lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(250, 249, 247, 0.97);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out; padding: 2rem;
  }
  .vr-lightbox.active { display: flex; }
  .vr-lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

  @media (max-width: 768px) {
    .vr-artwork { grid-template-columns: 1fr; gap: 1.5rem; padding: 2rem 0; }
    .vr-header { padding: 3rem 1.25rem 1.5rem; }
    .vr-gallery { padding: 2rem 1.25rem 4rem; }
  }
</style>
</head>
<body>

<div id="vr-app">
  <div class="vr-loading"><div class="spinner"></div><p>Loading viewing room</p></div>
</div>

<div class="vr-lightbox" id="vr-lightbox" onclick="closeLightbox()">
  <img id="vr-lightbox-img" src="" alt="">
</div>

<script>
(function() {

  // ============================================================
  // CONFIG
  // ============================================================
  const PROXY = '/api/airtable';
  const TBL_VR       = 'tbl8EUvqiOLudNvjv';
  const TBL_ARTWORKS = 'tblK8xDtKmakHWt6k';
  const TBL_ARTISTS  = 'tbl3fHryX8bPSYMyN';
  const EMAIL = 'diego@diez.gallery';

  const app = document.getElementById('vr-app');
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('vr');

  if (!slug) { showError('No viewing room specified.'); return; }
  loadViewingRoom(slug);

  // ============================================================
  // FETCH via existing Vercel proxy
  // Proxy format: /api/airtable?path=TABLE_ID&filterByFormula=...
  // ============================================================
  async function atFetch(tableId, qp = {}) {
    var parts = [PROXY + '?path=' + encodeURIComponent(tableId)];
    Object.entries(qp).forEach(function(pair) {
      if (pair[1] != null) parts.push(encodeURIComponent(pair[0]) + '=' + encodeURIComponent(String(pair[1])));
    });
    var url = parts.join('&');
    var res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  // ============================================================
  // LOAD
  // ============================================================
  async function loadViewingRoom(slug) {
    try {
      // 1. Find viewing room by slug
      const vrData = await atFetch(TBL_VR, {
        filterByFormula: '{URL slug} = "' + slug + '"',
        maxRecords: 1
      });
      if (!vrData.records || !vrData.records.length) {
        showError('Viewing room not found.'); return;
      }

      const vr = vrData.records[0].fields;
      const ids = vr['Artworks'] || [];
      if (!ids.length) { showError('This viewing room has no artworks yet.'); return; }

      // 2. Fetch artworks
      const awFormula = 'OR(' + ids.map(function(id) { return 'RECORD_ID()="' + id + '"'; }).join(',') + ')';
      const awData = await atFetch(TBL_ARTWORKS, { filterByFormula: awFormula, maxRecords: ids.length });
      const artworks = awData.records || [];

      // 3. Fetch artist names
      var artistIds = {};
      artworks.forEach(function(aw) {
        (aw.fields['Artist name'] || []).forEach(function(id) { artistIds[id] = true; });
      });
      var artistMap = {};
      var uniqueIds = Object.keys(artistIds);
      if (uniqueIds.length) {
        var aFormula = 'OR(' + uniqueIds.map(function(id) { return 'RECORD_ID()="' + id + '"'; }).join(',') + ')';
        var aData = await atFetch(TBL_ARTISTS, { filterByFormula: aFormula, maxRecords: uniqueIds.length });
        (aData.records || []).forEach(function(a) { artistMap[a.id] = a.fields['Name'] || 'Unknown'; });
      }

      // 4. Sort by Artist Index
      artworks.sort(function(a, b) { return (a.fields['Artist Index'] || 0) - (b.fields['Artist Index'] || 0); });

      // 5. Render
      render(vr, artworks, artistMap);

    } catch (err) {
      console.error(err);
      showError('Could not load the viewing room. Please try again later.');
    }
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render(vr, artworks, artistMap) {
    var vrName = vr['Name'] || 'Viewing Room';
    document.title = vrName + ' \u2014 Diez Gallery';

    var html = '<header class="vr-header">' +
      '<p class="vr-subtitle">Diez Gallery \u2014 Private Viewing Room</p>' +
      '<h1>' + esc(vrName) + '</h1></header><div class="vr-gallery">';

    artworks.forEach(function(aw, i) {
      var f = aw.fields;
      var title = f['Title'] || 'Untitled';
      var year = f['Year'] || '';
      var info = f['Info (Backup)'] || '';
      var imageUrl = f['Image URL'] || '';
      var status = f['Status'] || '';
      var priceEur = f['Price \u20ac'];

      var artistLinks = f['Artist name'] || [];
      var artistNames = artistLinks.map(function(id) { return artistMap[id] || 'Unknown'; }).join(', ');

      var priceDisplay = '';
      if (status === 'Sold') priceDisplay = '';
      else if (priceEur) priceDisplay = '\u20ac' + priceEur.toLocaleString('de-DE');
      else priceDisplay = 'Price on request';

      var statusHtml = '';
      if (status === 'Sold') statusHtml = '<span class="vr-artwork-status sold">Sold</span>';
      else if (status === 'On hold') statusHtml = '<span class="vr-artwork-status">On hold</span>';

      var subject = encodeURIComponent('Inquiry: ' + artistNames + ' \u2014 ' + title);
      var delay = Math.min(i * 0.08, 0.5);

      html += '<div class="vr-artwork" style="animation-delay:' + delay + 's">' +
        '<div class="vr-artwork-image" data-img="' + escAttr(imageUrl) + '">' +
        (imageUrl
          ? '<img src="' + escAttr(imageUrl) + '" alt="' + escAttr(title) + '" loading="lazy">'
          : '<div style="padding:4rem;text-align:center;color:#999;">Image not available</div>') +
        '</div><div class="vr-artwork-info">' +
        '<div class="vr-artwork-artist">' + esc(artistNames) + '</div>' +
        '<div class="vr-artwork-title">' + esc(title) + '</div>' +
        '<div class="vr-artwork-year">' + year + '</div>' +
        '<div class="vr-artwork-details">' + esc(info) + '</div>' +
        (priceDisplay ? '<div class="vr-artwork-price">' + priceDisplay + '</div>' : '') +
        statusHtml +
        ((status === 'Available' || status === 'Offered')
          ? '<a class="vr-artwork-inquire" href="mailto:' + EMAIL + '?subject=' + subject + '">Inquire</a>'
          : '') +
        '</div></div>';
    });

    html += '</div><footer class="vr-footer"><a href="https://diez.gallery" target="_blank">diez.gallery</a></footer>';
    app.innerHTML = html;

    // Lightbox delegation
    document.querySelectorAll('.vr-artwork-image').forEach(function(el) {
      el.addEventListener('click', function() {
        var src = el.getAttribute('data-img');
        if (src) openLightbox(src);
      });
    });
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function showError(msg) { app.innerHTML = '<div class="vr-error"><p>' + msg + '</p></div>'; }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

})();

function openLightbox(src) {
  var lb = document.getElementById('vr-lightbox');
  document.getElementById('vr-lightbox-img').src = src;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  var lb = document.getElementById('vr-lightbox');
  lb.classList.remove('active');
  document.getElementById('vr-lightbox-img').src = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
