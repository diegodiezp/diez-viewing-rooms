<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewing Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #FFFFFF;
  color: #000000;
  -webkit-font-smoothing: antialiased;
}
#root { height: 100%; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #333333; border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

@media (max-width: 768px) {
  body { font-size: 14px; }
}

@media (max-width: 480px) {
  body { font-size: 13px; }
}

/* ── TYPOGRAPHY CLASSES ────────────────────────────────────────────────────────── */
.artist-name {
  font-size: 15px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #666666;
  margin-bottom: 10px;
}

.work-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  font-style: italic;
  line-height: 1.15;
  color: #000000;
}

.work-title:hover {
  color: #333333;
}

.year-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999999;
}

.year-value {
  font-size: 13px;
  color: #333333;
  text-align: right;
  white-space: pre-line;

}

.details-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999999;
  flex-shrink: 0;
}

.details-value {
  font-size: 13px;
  color: #333333;
  text-align: left;
  white-space: pre-line;
}

.price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: #000000;
  font-weight: 500;
}

.subtitle-gray {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #666666;
  margin-bottom: 14px;
}

.body-text {
  font-size: 13px;
  color: #333333;
  line-height: 1.65;
}

.button-back {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #666666;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.15s;
}

.button-back:hover {
  color: #000000;
}

.counter-text {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #999999;
}

.border-line {
  border-color: #000000;
}

.divider {
  border-top: 1px solid #000000;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid #eeeeee;
  gap: 12px;
}

.thumbnail {
  width: 44px;
  height: 44px;
  border-radius: 1px;
  overflow: hidden;
  border: 2px solid transparent;
  opacity: 0.45;
  transition: all 0.2s;
  cursor: pointer;
  flex-shrink: 0;
}

.thumbnail.active {
  border: 2px solid #000000;
  opacity: 1;
}
</style>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const PROXY        = '/api/airtable';
const TBL_VR       = 'tbl8EUvqiOLudNvjv';   // Viewing Rooms
const TBL_ARTWORKS = 'tblK8xDtKmakHWt6k';   // Artworks
const TBL_ARTISTS  = 'tbl3fHryX8bPSYMyN';   // Artists
const EMAIL        = 'diego@diez.gallery';

// ── AIRTABLE FETCH ────────────────────────────────────────────────────────────
async function atFetch(tableId, qp = {}) {
  const parts = [PROXY + '?path=' + encodeURIComponent(tableId)];
  Object.entries(qp).forEach(([k, v]) => {
    if (v != null) parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
  });
  const res = await fetch(parts.join('&'));
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

// ── SHARED UI ─────────────────────────────────────────────────────────────────
function Dot({ available }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:11,
      letterSpacing:'0.07em', textTransform:'uppercase',
      color: available ? '#5A7A5A' : '#999999' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', display:'inline-block',
        background: available ? '#7AB07A' : '#CCCCCC' }}/>
      {available ? 'Available' : 'Sold'}
    </span>
  );
}

function InquireBtn({ small, artist, title }) {
  const [h, setH] = useState(false);
  const subject = encodeURIComponent('Inquiry: ' + artist + ' — ' + title);
  return (
    <a href={`mailto:${EMAIL}?subject=${subject}`}
      onMouseEnter={() => setH(true)}
      onMouseLeave={() => setH(false)}
      onClick={e => e.stopPropagation()}
      style={{
        display: 'inline-block',
        background: h ? '#000000' : 'transparent',
        color: h ? '#FFFFFF' : '#000000',
        border: '1px solid #000000',
        padding: small ? '6px 14px' : '9px 22px',
        fontSize: small ? 10 : 11,
        letterSpacing: '0.12em', textTransform: 'uppercase',
        fontFamily: "'DM Sans', sans-serif", fontWeight: 400,
        cursor: 'pointer', borderRadius: 1, transition: 'all 0.18s',
        textDecoration: 'none',
      }}>Inquire</a>
  );
}

// ── ARTWORK IMAGE ─────────────────────────────────────────────────────────────
function ArtImage({ src, title, style }) {
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(false);
  if (!src || error) {
    return (
      <div style={{ ...style, background: '#EDE9E3', display:'flex',
        alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize:10, color:'#BBB', letterSpacing:'0.1em',
          textTransform:'uppercase' }}>Image unavailable</span>
      </div>
    );
  }
  return (
    <div style={{ ...style, position:'relative', background:'#EDE9E3' }}>
      {!loaded && (
        <div style={{ position:'absolute', inset:0, background:'#EDE9E3' }}/>
      )}
      <img
        src={src}
        alt={title}
        onLoad={() => setLoaded(true)}
        onError={() => setError(true)}
        style={{ width:'100%', height:'100%', objectFit:'contain', display:'block',
          opacity: loaded ? 1 : 0, transition:'opacity 0.3s' }}
      />
    </div>
  );
}

// ── LANDING VIEW ──────────────────────────────────────────────────────────────
function Landing({ room, works, onSelect }) {
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  return (
    <div style={{ minHeight:'100vh', background:'#FFFFFF' }}>
      <header style={{ maxWidth:860, margin:'0 auto', padding: isMobile ? '32px 20px 24px' : '56px 40px 36px' }}>
        <div className="subtitle-gray">
          {room.gallery}{room.booth ? ` · ${room.booth}` : ''}{room.dates ? ` · ${room.dates}` : ''}
        </div>
        <h1 style={{ fontFamily:"'Cormorant Garamond', serif",
          fontSize: isMobile ? 28 : 46, fontWeight:400, letterSpacing:'-0.01em', lineHeight:1.05 }}>
          {room.title}
        </h1>
        <div className="divider" style={{ marginTop:28 }}/>
        {room.intro && (
          <p className="body-text" style={{ marginTop:16, maxWidth:480 }}>{room.intro}</p>
        )}
      </header>

      <main style={{ maxWidth:860, margin:'0 auto', padding: isMobile ? '0 20px 80px' : '0 40px 80px' }}>
        {works.map((work, i) => (
          <WorkRow key={work.id} work={work} index={i} onSelect={() => onSelect(i)} />
        ))}
      </main>

      <footer style={{ maxWidth:860, margin:'0 auto', padding: isMobile ? '0 20px 40px' : '0 40px 40px',
        borderTop:'1px solid #000000', marginTop:0 }}>
        <p style={{ fontSize:11, color:'#999999', letterSpacing:'0.06em',
          textAlign:'center', paddingTop:24 }}>
          <a href="https://diez.gallery" target="_blank"
            style={{ color:'#666666', textDecoration:'none' }}>diez.gallery</a>
        </p>
      </footer>
    </div>
  );
}

function WorkRow({ work, index, onSelect }) {
  const [hov, setHov] = useState(false);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  return (
    <div
      onClick={onSelect}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display:'grid', 
        gridTemplateColumns: isMobile ? '1fr' : '340px 1fr', 
        gap: isMobile ? '16px' : '48px',
        padding:'12px 0', 
        borderBottom:'1px solid #000000',
        cursor:'pointer', 
        transition:'opacity 0.2s',
        animation: `fadeUp 0.4s ${index * 0.07}s both cubic-bezier(0.22,0.68,0,1)`,
      }}
    >
      {/* Image */}
      <div style={{ position:'relative', overflow:'hidden', borderRadius:1 }}>
        <div style={{ width:'100%', paddingTop:`${(1/work.ratio)*100}%`, position:'relative', overflow:'hidden' }}>
          {work.imageUrl ? (
            <img
              src={work.imageUrl}
              alt={work.title}
              loading="lazy"
              style={{
                position:'absolute', inset:0, width:'100%', height:'100%',
                objectFit:'contain', display:'block',
                transform: hov ? 'scale(1.03)' : 'scale(1)',
                transition:'transform 0.5s cubic-bezier(0.22,0.68,0,1)',
              }}
            />
          ) : (
            <div style={{ position:'absolute', inset:0,
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span style={{ fontSize:9, color:'#999999', letterSpacing:'0.1em', textTransform:'uppercase' }}>
                No image
              </span>
            </div>
          )}
        </div>
      </div>

      {/* Info */}
      <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', paddingTop:4 }}>
        <div className="artist-name">{work.artist}</div>
        <h2 className="work-title">{work.title}</h2>
        {work.year && <div className="year-value" style={{ marginTop:14 }}>{work.year}</div>}
        {work.info && <div className="details-value" style={{ marginTop:3 }}>{work.info}</div>}
        <div style={{ marginTop:20 }}>
          {work.price && (
            <div className="price" style={{ marginBottom:8 }}>
              {work.status === 'Sold' ? '' : `€ ${Number(work.price).toLocaleString('de-DE')}`}
            </div>
          )}
          <Dot available={work.available}/>
        </div>
        {work.available && (
          <div style={{ marginTop:16 }}>
            <InquireBtn small={false} artist={work.artist} title={work.title}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DETAIL SPLIT ──────────────────────────────────────────────────────────────
function DetailSplit({ works, workIdx, onBack, onPrev, onNext }) {
  const work = works[workIdx];
  const total = works.length;
  const idx = workIdx;
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', background:'#FFFFFF' }}>
      {/* Top bar */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
        padding: isMobile ? '10px 16px' : '14px 32px', borderBottom:'1px solid #000000', flexShrink:0 }}>
        <button onClick={onBack} className="button-back">
          ← All works
        </button>
        <span className="counter-text">
          {String(idx+1).padStart(2,'0')} / {String(total).padStart(2,'0')}
        </span>
      </div>

      {/* Split body */}
      <div style={{ flex:1, display:'flex', flexDirection: isMobile ? 'column' : 'row', overflow:'hidden' }}>

        {/* Image panel */}
        <div style={{ flex: isMobile ? '1' : '0 0 60%', background:'#FFFFFF',
          display:'flex', alignItems:'center', justifyContent:'center',
          padding:'0', position:'relative', overflow:'auto' }}>
          {work.imageUrl ? (
            <img src={work.imageUrl} alt={work.title}
              style={{ 
                maxWidth:'100%', maxHeight:'100%',
                width:'auto', height:'auto',
                objectFit:'contain', display:'block',
                animation:'fadeIn 0.35s ease both'
              }}/>
          ) : (
            <div style={{ width:'100%', height:'100%', background:'#FFFFFF',
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span style={{ fontSize:10, color:'#BBB', letterSpacing:'0.1em', textTransform:'uppercase' }}>
                No image
              </span>
            </div>
          )}

          {/* Arrows */}
          {!isMobile && [{fn:onPrev,dis:idx===0,lbl:'←',pos:'left'},{fn:onNext,dis:idx===total-1,lbl:'→',pos:'right'}].map(a => (
            <button key={a.pos} onClick={a.fn} disabled={a.dis}
              style={{
                position:'absolute', [a.pos]:16, top:'50%', transform:'translateY(-50%)',
                width:38, height:38, borderRadius:'50%', border:'none',
                background:'rgba(255,255,255,0.85)',
                color: a.dis ? '#CCC' : '#444',
                cursor: a.dis ? 'default' : 'pointer',
                fontSize:16, display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow:'0 2px 10px rgba(0,0,0,0.09)', transition:'all 0.15s', fontFamily:'serif',
              }}>{a.lbl}</button>
          ))}
        </div>

        {/* Info panel */}
        <div style={{ flex: isMobile ? '0 0 auto' : '0 0 40%', overflowY:'auto', borderLeft: isMobile ? 'none' : '1px solid #000000', borderTop: isMobile ? '1px solid #000000' : 'none',
          display:'flex', flexDirection:'column', animation:'slideRight 0.35s ease both',
          maxHeight: isMobile ? '50vh' : 'auto' }}>

          <div style={{ padding: isMobile ? '16px 16px 0' : '32px 36px 0' }}>
            <div className="artist-name">{work.artist}</div>
            <h1 className="work-title">{work.title}</h1>
          </div>

          <div className="divider" style={{ margin: isMobile ? '16px 16px' : '24px 36px' }}/>

          <div style={{ padding: isMobile ? '0 16px' : '0 36px' }}>
            {[
              work.year ? ['Year', work.year] : null,
              work.info ? ['Details', work.info] : null,
            ].filter(Boolean).map(([k, v]) => (
              <div key={k} className="info-row">
                <span className="year-label">{k}</span>
                <span className="year-value">{v}</span>
              </div>
            ))}
          </div>

          <div style={{ flex:1 }}/>

          <div className="divider" style={{ padding: isMobile ? '16px 16px' : '20px 36px 28px', margin:0,
            display:'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent:'space-between', alignItems: isMobile ? 'flex-start' : 'center', gap: isMobile ? 12 : 0 }}>
            <div>
              {work.price && work.status !== 'Sold' && (
                <div className="price">
                  € {Number(work.price).toLocaleString('de-DE')}
                </div>
              )}
              <div style={{ marginTop:5 }}><Dot available={work.available}/></div>
            </div>
            {work.available && <InquireBtn artist={work.artist} title={work.title}/>}
          </div>

          {/* Thumbnails */}
          <div style={{ padding: isMobile ? '0 16px 16px' : '0 36px 28px', display:'flex', gap:8, flexWrap:'wrap', overflowX: isMobile ? 'auto' : 'visible' }}>
            {works.map((w, i) => (
              <div key={w.id} onClick={() => { if (i < idx) onPrev(); if (i > idx) onNext(); }}
                className={`thumbnail ${i===idx ? 'active' : ''}`}>
                {w.imageUrl ? (
                  <img src={w.imageUrl} alt={w.title}
                    style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
                ) : (
                  <div style={{ width:'100%', height:'100%', background:'#DDDDDD' }}/>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LOADING / ERROR ───────────────────────────────────────────────────────────
function Loading() {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', height:'100vh', gap:16 }}>
      <div style={{ width:24, height:24, border:'2px solid #E0DDD8',
        borderTopColor:'#1C1C1A', borderRadius:'50%',
        animation:'spin 0.8s linear infinite' }}/>
      <p style={{ fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
        color:'#AAA' }}>Loading</p>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}
function ErrorView({ msg }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
      height:'100vh' }}>
      <p style={{ fontSize:12, color:'#999', letterSpacing:'0.06em' }}>{msg}</p>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [status, setStatus] = useState('loading'); // loading | error | ready
  const [errorMsg, setErrorMsg] = useState('');
  const [room, setRoom] = useState(null);
  const [works, setWorks] = useState([]);
  const [screen, setScreen] = useState('landing'); // landing | detail
  const [workIdx, setWorkIdx] = useState(0);

  // Get slug from URL
const slug = new URLSearchParams(window.location.search).get('vr') || window.location.pathname.split('/').pop();
  
  useEffect(() => {
    if (!slug) { setStatus('error'); setErrorMsg('No viewing room specified.'); return; }
    load(slug);
  }, []);

  async function load(slug) {
    try {
      // 1. Find viewing room by slug
      const vrData = await atFetch(TBL_VR, {
        filterByFormula: `{URL slug} = "${slug}"`,
        maxRecords: 1,
      });
      if (!vrData.records?.length) {
        setStatus('error'); setErrorMsg('Viewing room not found.'); return;
      }
      const vr = vrData.records[0].fields;
      const artworkIds = vr['Artworks'] || [];
      if (!artworkIds.length) {
        setStatus('error'); setErrorMsg('This viewing room has no artworks yet.'); return;
      }

      setRoom({
        gallery: 'Diez Gallery',
        title: vr['Name'] || 'Viewing Room',
        dates: vr['Dates'] || '',
        booth: vr['Booth'] || '',
        intro: vr['Introduction'] || '',
      });

      // 2. Fetch artworks
      const awFormula = 'OR(' + artworkIds.map(id => `RECORD_ID()="${id}"`).join(',') + ')';
      const awData = await atFetch(TBL_ARTWORKS, { filterByFormula: awFormula, maxRecords: artworkIds.length });
      const artworks = awData.records || [];

      // 3. Fetch artist names
      const artistIds = {};
      artworks.forEach(aw => (aw.fields['Artist name'] || []).forEach(id => artistIds[id] = true));
      const artistMap = {};
      const uniqueIds = Object.keys(artistIds);
      if (uniqueIds.length) {
        const aFormula = 'OR(' + uniqueIds.map(id => `RECORD_ID()="${id}"`).join(',') + ')';
        const aData = await atFetch(TBL_ARTISTS, { filterByFormula: aFormula, maxRecords: uniqueIds.length });
        (aData.records || []).forEach(a => { artistMap[a.id] = a.fields['Name'] || 'Unknown'; });
      }

      // 4. Sort by Artist Index
      artworks.sort((a, b) => (a.fields['Artist Index'] || 0) - (b.fields['Artist Index'] || 0));

      // 5. Map to work objects
      const mapped = artworks.map((aw, i) => {
        const f = aw.fields;
        const artistLinks = f['Artist name'] || [];
        const artistName = artistLinks.map(id => artistMap[id] || 'Unknown').join(', ');
        const status = f['Status'] || '';
        const available = status !== 'Sold' && status !== 'On hold';
        const price = f['Price €'] || f['Price'] || null;

        return {
          id: aw.id,
          title: f['Title'] || 'Untitled',
          artist: artistName,
          year: f['Year'] || '',
          info: f['Info (Backup)'] || '',
imageUrl: f['Image URL'] || '/api/image?id=' + aw.id,
          status,
          available,
          price,
          // Ratio: try to derive from dimensions, fallback to 4/3
          ratio: (() => {
            const info = f['Info (Backup)'] || '';
            const m = info.match(/(\d+)\s*[×x]\s*(\d+)/);
            if (m) return Number(m[1]) / Number(m[2]);
            return 4/3;
          })(),
        };
      });

      document.title = (vr['Name'] || 'Viewing Room') + ' — Diez Gallery';
      setWorks(mapped);
      setStatus('ready');
    } catch (err) {
      console.error(err);
      setStatus('error');
      setErrorMsg('Could not load the viewing room. Please try again.');
    }
  }

  const openWork = useCallback((i) => {
    setWorkIdx(i);
    setScreen('detail');
  }, []);

  const go = useCallback((dir) => {
    setWorkIdx(prev => {
      const next = prev + dir;
      if (next < 0 || next >= works.length) return prev;
      return next;
    });
  }, [works.length]);

  useEffect(() => {
    const h = (e) => {
      if (screen !== 'detail') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
      if (e.key === 'Escape') setScreen('landing');
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [screen, go]);

  if (status === 'loading') return <Loading/>;
  if (status === 'error')   return <ErrorView msg={errorMsg}/>;

  if (screen === 'landing') {
    return (
      <div style={{ height:'100vh', overflowY:'auto' }}>
        <Landing room={room} works={works} onSelect={openWork}/>
      </div>
    );
  }

  return (
    <div style={{ height:'100vh', overflow:'hidden' }}>
      <DetailSplit
        works={works}
        workIdx={workIdx}
        onBack={() => setScreen('landing')}
        onPrev={() => go(-1)}
        onNext={() => go(1)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
