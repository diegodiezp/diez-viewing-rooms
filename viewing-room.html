<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Replica', sans-serif;
  background: #FFFFFF;
  color: #000000;
  -webkit-font-smoothing: antialiased;
}
#root { height: 100%; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #333333; border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

@media (max-width: 768px) {
  body { font-size: 14px; }
}
@media (max-width: 480px) {
  body { font-size: 13px; }
}

.artist-name {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #666666;
  margin-bottom: 8px;
}
.work-title {
  font-family: 'Replica', sans-serif;
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.2;
  color: #000000;
}
.work-title:hover { color: #333333; }
.year-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999999;
}
.year-value {
  font-size: 13px;
  color: #333333;
  text-align: left;
  white-space: pre-line;
}
.details-value {
  font-size: 13px;
  color: #333333;
  text-align: left;
  white-space: pre-line;
}
.price {
  font-family: 'Replica', sans-serif;
  font-size: 18px;
  color: #000000;
  font-weight: 400;
}
.subtitle-gray {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #666666;
  margin-bottom: 14px;
}
.body-text {
  font-size: 13px;
  color: #333333;
  line-height: 1.65;
}
.button-back {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #666666;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Replica', sans-serif;
  transition: color 0.15s;
}
.button-back:hover { color: #000000; }
.counter-text {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #999999;
}
.divider { border-top: 1px solid #000000; }
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid #eeeeee;
  gap: 12px;
}
.thumbnail {
  width: 44px;
  height: 44px;
  border-radius: 1px;
  overflow: hidden;
  border: 2px solid transparent;
  opacity: 0.45;
  transition: all 0.2s;
  cursor: pointer;
  flex-shrink: 0;
}
.thumbnail.active {
  border: 2px solid #000000;
  opacity: 1;
}
</style>
</head>
<body>
<div id="root"></div>
</body>
